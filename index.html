<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Cyber Network Monitor</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  background:#020617;
  overflow:hidden;
  color:white;
}

/* BACKGROUND */

.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left,#0ea5e955,transparent 35%),
    radial-gradient(circle at bottom right,#9333ea44,transparent 35%),
    #020617;
}

.grid{
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);

  background-size:40px 40px;
  animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
  from{
    transform:translateY(0);
  }
  to{
    transform:translateY(40px);
  }
}

/* MAIN */

.container{
  position:relative;
  z-index:2;
  width:100%;
  height:100vh;
  padding:25px;

  display:grid;
  grid-template-columns:1.3fr 1fr;
  gap:20px;
}

/* LEFT PANEL */

.left-panel{
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* RIGHT PANEL */

.right-panel{
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* CARD */

.card{
  background:rgba(15,23,42,.65);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(14px);
  border-radius:25px;
  padding:25px;
  box-shadow:
    0 0 40px rgba(0,255,255,.06),
    inset 0 0 30px rgba(255,255,255,.02);
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  width:250px;
  height:250px;
  background:radial-gradient(circle,#0ea5e933,transparent);
  top:-120px;
  right:-120px;
}

/* TITLE */

.title{
  font-size:34px;
  font-weight:700;
  color:#38bdf8;
  margin-bottom:20px;
  text-shadow:0 0 15px #0ea5e9;
}

/* NETWORK BARS */

.signal-area{
  height:280px;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:18px;
}

.bar{
  width:55px;
  background:#1e293b;
  border-radius:18px;
  transition:.4s;
  position:relative;
}

.bar.active{
  background:linear-gradient(to top,#22c55e,#4ade80);
  box-shadow:
    0 0 25px #22c55e,
    0 0 60px #22c55e88;
}

.bar::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,transparent,#ffffff55);
  border-radius:18px;
}

.b1{height:70px;}
.b2{height:120px;}
.b3{height:170px;}
.b4{height:220px;}
.b5{height:270px;}

/* INFO GRID */

.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.info-box{
  background:#0f172a;
  border-radius:20px;
  padding:22px;
  border:1px solid rgba(255,255,255,.05);
}

.label{
  color:#94a3b8;
  font-size:14px;
  margin-bottom:10px;
}

.value{
  font-size:30px;
  font-weight:bold;
}

/* STATUS */

.status{
  margin-top:20px;
  padding:18px;
  border-radius:18px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
}

.good{
  background:rgba(34,197,94,.12);
  color:#4ade80;
}

.medium{
  background:rgba(234,179,8,.12);
  color:#facc15;
}

.bad{
  background:rgba(239,68,68,.12);
  color:#f87171;
}

/* RADAR */

.radar{
  height:320px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.circle{
  position:absolute;
  border:2px solid rgba(0,255,255,.12);
  border-radius:50%;
}

.c1{width:120px;height:120px;}
.c2{width:220px;height:220px;}
.c3{width:320px;height:320px;}

.scan{
  position:absolute;
  width:160px;
  height:160px;
  background:linear-gradient(
    45deg,
    rgba(0,255,255,.5),
    transparent
  );
  transform-origin:bottom right;
  animation:rotate 3s linear infinite;
}

@keyframes rotate{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}

/* LOG */

.log{
  height:220px;
  overflow:auto;
}

.log-item{
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  background:#0f172a;
  border-left:4px solid #0ea5e9;
  font-size:14px;
}

/* ALERT */

.alert{
  position:fixed;
  top:25px;
  right:25px;
  background:#ef4444;
  padding:18px 24px;
  border-radius:18px;
  font-weight:bold;
  box-shadow:0 0 30px rgba(239,68,68,.5);
  transform:translateX(500px);
  transition:.5s;
  z-index:999;
}

.alert.show{
  transform:translateX(0);
}

/* BUTTON */

.btn{
  margin-top:20px;
  width:100%;
  padding:18px;
  border:none;
  border-radius:18px;
  background:linear-gradient(90deg,#0ea5e9,#2563eb);
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:.3s;
  font-weight:bold;
}

.btn:hover{
  transform:scale(1.02);
  box-shadow:0 0 25px #0ea5e9;
}

/* RESPONSIVE */

@media(max-width:1100px){

  .container{
    grid-template-columns:1fr;
    overflow:auto;
  }

}

</style>
</head>

<body>

<div class="bg">
  <div class="grid"></div>
</div>

<div class="alert" id="alertBox">
🚫 NETWORK CONNECTION LOST
</div>

<div class="container">

<!-- LEFT -->

<div class="left-panel">

<div class="card">

<div class="title">
📡 CYBER NETWORK MONITOR
</div>

<div class="signal-area">

<div class="bar b1"></div>
<div class="bar b2"></div>
<div class="bar b3"></div>
<div class="bar b4"></div>
<div class="bar b5"></div>

</div>

<div class="status good" id="status">
🚀 EXCELLENT CONNECTION
</div>

<button class="btn" onclick="updateSignal()">
🔄 REFRESH NETWORK
</button>

</div>

<div class="info-grid">

<div class="info-box">
<div class="label">DOWNLOAD</div>
<div class="value" id="speed">
120 Mbps
</div>
</div>

<div class="info-box">
<div class="label">PING</div>
<div class="value" id="ping">
14 ms
</div>
</div>

<div class="info-box">
<div class="label">SIGNAL</div>
<div class="value" id="signal">
92%
</div>
</div>

<div class="info-box">
<div class="label">NETWORK</div>
<div class="value" id="network">
5G
</div>
</div>

</div>

</div>

<!-- RIGHT -->

<div class="right-panel">

<div class="card">

<div class="title">
🛰 SIGNAL RADAR
</div>

<div class="radar">

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="scan"></div>

</div>

</div>

<div class="card">

<div class="title">
📜 NETWORK LOGS
</div>

<div class="log" id="logs">

<div class="log-item">
[OK] System initialized
</div>

</div>

</div>

</div>

</div>

<script>

const bars = document.querySelectorAll(".bar");

const logs = document.getElementById("logs");

function random(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function addLog(text){

  const div = document.createElement("div");

  div.className = "log-item";

  div.innerHTML =
    `[${new Date().toLocaleTimeString()}] ${text}`;

  logs.prepend(div);

}

function playAlert(){

  const audio = new Audio(
    "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
  );

  audio.play();

}

function showAlert(){

  const box = document.getElementById("alertBox");

  box.classList.add("show");

  setTimeout(()=>{
    box.classList.remove("show");
  },3000);

}

function updateSignal(){

  if(!navigator.onLine){

    offlineMode();
    return;

  }

  let speed = random(20,200);
  let ping = random(5,80);
  let signal = random(25,100);

  let networkTypes = [
    "5G",
    "WiFi 6",
    "Fiber",
    "Starlink",
    "4G LTE"
  ];

  let network =
    networkTypes[random(0,networkTypes.length-1)];

  document.getElementById("speed").innerHTML =
    speed + " Mbps";

  document.getElementById("ping").innerHTML =
    ping + " ms";

  document.getElementById("signal").innerHTML =
    signal + "%";

  document.getElementById("network").innerHTML =
    network;

  bars.forEach(bar=>{
    bar.classList.remove("active");
  });

  let activeBars = Math.ceil(signal / 20);

  for(let i=0;i<activeBars;i++){
    bars[i].classList.add("active");
  }

  const status =
    document.getElementById("status");

  if(signal > 75){

    status.className = "status good";

    status.innerHTML =
      "🚀 EXCELLENT CONNECTION";

  }
  else if(signal > 40){

    status.className = "status medium";

    status.innerHTML =
      "⚠️ MEDIUM CONNECTION";

  }
  else{

    status.className = "status bad";

    status.innerHTML =
      "❌ WEAK SIGNAL";

  }

  addLog(
    `Signal updated → ${signal}% | ${speed} Mbps`
  );

}

function offlineMode(){

  document.getElementById("speed").innerHTML =
    "0 Mbps";

  document.getElementById("ping").innerHTML =
    "Timeout";

  document.getElementById("signal").innerHTML =
    "0%";

  document.getElementById("network").innerHTML =
    "OFFLINE";

  bars.forEach(bar=>{
    bar.classList.remove("active");
  });

  const status =
    document.getElementById("status");

  status.className = "status bad";

  status.innerHTML =
    "🚫 CONNECTION LOST";

  playAlert();

  showAlert();

  addLog(
    "🚫 INTERNET CONNECTION LOST"
  );

}

window.addEventListener(
  "offline",
  offlineMode
);

window.addEventListener(
  "online",
  updateSignal
);

updateSignal();

setInterval(updateSignal,4000);

</script>

</body>
</html>
