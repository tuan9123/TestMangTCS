<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ULTIMATE CYBER NETWORK OS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  background:#020617;
  color:white;
  overflow:hidden;
}

/* BACKGROUND */

.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left,#00ffff22,transparent 35%),
    radial-gradient(circle at bottom right,#9333ea33,transparent 35%),
    #020617;
}

.grid{
  position:absolute;
  inset:0;

  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);

  background-size:40px 40px;

  animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
  from{
    transform:translateY(0);
  }
  to{
    transform:translateY(40px);
  }
}

/* MATRIX */

.matrix{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.08;
}

/* MAIN */

.container{
  position:relative;
  z-index:2;
  width:100%;
  height:100vh;

  display:grid;
  grid-template-columns:1.2fr 1fr 1fr;
  gap:20px;

  padding:20px;
}

/* CARD */

.card{
  background:rgba(15,23,42,.75);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(18px);

  border-radius:24px;

  padding:22px;

  overflow:hidden;
  position:relative;

  box-shadow:
    0 0 40px rgba(0,255,255,.05),
    inset 0 0 20px rgba(255,255,255,.02);
}

.card::before{
  content:"";
  position:absolute;
  width:260px;
  height:260px;

  background:radial-gradient(circle,#0ea5e922,transparent);

  top:-130px;
  right:-130px;
}

/* TITLE */

.title{
  font-size:24px;
  color:#38bdf8;
  margin-bottom:20px;
  font-weight:bold;
  text-shadow:0 0 15px #0ea5e9;
}

/* SIGNAL */

.signal-area{
  height:260px;

  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:16px;
}

.bar{
  width:48px;
  background:#1e293b;
  border-radius:18px;
  transition:.4s;
}

.bar.active{
  background:linear-gradient(to top,#22c55e,#4ade80);

  box-shadow:
    0 0 25px #22c55e,
    0 0 50px #22c55e88;
}

.b1{height:60px;}
.b2{height:110px;}
.b3{height:160px;}
.b4{height:210px;}
.b5{height:260px;}

/* STATUS */

.status{
  margin-top:20px;
  padding:16px;
  border-radius:16px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.good{
  background:rgba(34,197,94,.12);
  color:#4ade80;
}

.medium{
  background:rgba(234,179,8,.12);
  color:#facc15;
}

.bad{
  background:rgba(239,68,68,.12);
  color:#f87171;
}

/* INFO */

.info-grid{
  margin-top:20px;

  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.info{
  background:#0f172a;
  border-radius:18px;
  padding:18px;
}

.label{
  color:#94a3b8;
  font-size:12px;
}

.value{
  font-size:24px;
  margin-top:8px;
  font-weight:bold;
}

/* BUTTON */

.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  margin-top:15px;

  background:linear-gradient(90deg,#0ea5e9,#2563eb);

  color:white;
  cursor:pointer;
  transition:.3s;
  font-size:15px;
  font-weight:bold;
}

.btn:hover{
  transform:scale(1.02);
  box-shadow:0 0 20px #0ea5e9;
}

/* TERMINAL */

.terminal{
  height:250px;
  overflow:auto;
  background:black;
  color:#22c55e;
  padding:14px;
  border-radius:16px;
  font-size:13px;
}

/* LOG */

.log{
  height:250px;
  overflow:auto;
}

.log-item{
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  border-left:4px solid #0ea5e9;
  font-size:12px;
}

/* RADAR */

.radar{
  height:300px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.circle{
  position:absolute;
  border:2px solid rgba(0,255,255,.12);
  border-radius:50%;
}

.c1{width:120px;height:120px;}
.c2{width:220px;height:220px;}
.c3{width:320px;height:320px;}

.scan{
  position:absolute;
  width:170px;
  height:170px;

  background:linear-gradient(
    45deg,
    rgba(0,255,255,.5),
    transparent
  );

  transform-origin:bottom right;

  animation:rotate 3s linear infinite;
}

@keyframes rotate{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}

/* ALERT */

.alert{
  position:fixed;
  top:20px;
  right:20px;

  background:#ef4444;

  padding:18px 24px;

  border-radius:18px;

  transform:translateX(400px);

  transition:.5s;

  z-index:999;

  font-weight:bold;
}

.alert.show{
  transform:translateX(0);
}

/* RESPONSIVE */

@media(max-width:1300px){

  .container{
    grid-template-columns:1fr;
    overflow:auto;
  }

}

</style>
</head>

<body>

<div class="bg">
  <div class="grid"></div>
</div>

<canvas class="matrix" id="matrix"></canvas>

<div class="alert" id="alertBox">
🚫 INTERNET CONNECTION LOST
</div>

<div class="container">

<!-- LEFT -->

<div>

<div class="card">

<div class="title">
📡 CYBER NETWORK OS
</div>

<div class="signal-area">

<div class="bar b1"></div>
<div class="bar b2"></div>
<div class="bar b3"></div>
<div class="bar b4"></div>
<div class="bar b5"></div>

</div>

<div class="status good" id="status">
🚀 EXCELLENT CONNECTION
</div>

<button class="btn" onclick="updateSignal()">
🔄 REFRESH
</button>

<button class="btn" onclick="exportTXT()">
📥 EXPORT TXT
</button>

<button class="btn" onclick="exportJSON()">
🧠 EXPORT JSON
</button>

<div class="info-grid">

<div class="info">
<div class="label">DOWNLOAD</div>
<div class="value" id="speed">
120 Mbps
</div>
</div>

<div class="info">
<div class="label">PING</div>
<div class="value" id="ping">
14 ms
</div>
</div>

<div class="info">
<div class="label">SIGNAL</div>
<div class="value" id="signal">
92%
</div>
</div>

<div class="info">
<div class="label">NETWORK</div>
<div class="value" id="network">
5G
</div>
</div>

</div>

</div>

</div>

<!-- CENTER -->

<div>

<div class="card">

<div class="title">
📈 REALTIME GRAPH
</div>

<canvas id="chart"></canvas>

</div>

<div class="card">

<div class="title">
💻 HACKER TERMINAL
</div>

<div class="terminal" id="terminal">

> SYSTEM INITIALIZED...

</div>

</div>

</div>

<!-- RIGHT -->

<div>

<div class="card">

<div class="title">
🛰 SIGNAL RADAR
</div>

<div class="radar">

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="scan"></div>

</div>

</div>

<div class="card">

<div class="title">
📜 NETWORK LOGS
</div>

<div class="log" id="logs">

<div class="log-item">
[OK] SYSTEM INITIALIZED
</div>

</div>

</div>

</div>

</div>

<script>

/* MATRIX EFFECT */

const matrix =
  document.getElementById("matrix");

const ctx =
  matrix.getContext("2d");

matrix.width =
  window.innerWidth;

matrix.height =
  window.innerHeight;

const letters =
  "01";

const fontSize = 14;

const columns =
  matrix.width / fontSize;

const drops = [];

for(let x=0;x<columns;x++){

  drops[x]=1;

}

function drawMatrix(){

  ctx.fillStyle =
    "rgba(0,0,0,0.05)";

  ctx.fillRect(
    0,
    0,
    matrix.width,
    matrix.height
  );

  ctx.fillStyle="#0f0";

  ctx.font =
    fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){

    const text =
      letters[
        Math.floor(
          Math.random()*letters.length
        )
      ];

    ctx.fillText(
      text,
      i*fontSize,
      drops[i]*fontSize
    );

    if(
      drops[i]*fontSize >
      matrix.height &&
      Math.random() > 0.975
    ){

      drops[i]=0;

    }

    drops[i]++;

  }

}

setInterval(drawMatrix,35);

/* NETWORK */

const bars =
  document.querySelectorAll(".bar");

const logs =
  document.getElementById("logs");

const terminal =
  document.getElementById("terminal");

let networkLogs=[];

let stats={
  disconnects:0
};

function random(min,max){

  return Math.floor(
    Math.random()*(max-min+1)
  )+min;

}

function addLog(text){

  const time =
    new Date().toLocaleTimeString();

  const full =
    `[${time}] ${text}`;

  networkLogs.push(full);

  const div =
    document.createElement("div");

  div.className =
    "log-item";

  div.innerHTML =
    full;

  logs.prepend(div);

}

function terminalLog(text){

  terminal.innerHTML +=
    `<br>> ${text}`;

  terminal.scrollTop =
    terminal.scrollHeight;

}

function playAlert(){

  const audio =
    new Audio(
      "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
    );

  audio.play();

}

function voiceAlert(text){

  speechSynthesis.speak(
    new SpeechSynthesisUtterance(text)
  );

}

function showAlert(){

  const box =
    document.getElementById("alertBox");

  box.classList.add("show");

  setTimeout(()=>{

    box.classList.remove("show");

  },3000);

}

/* CHART */

const chartCtx =
  document.getElementById("chart");

const chart =
  new Chart(chartCtx,{

    type:"line",

    data:{
      labels:[],

      datasets:[{

        label:"Ping",

        data:[],

        borderColor:"#00ffff",

        tension:.4

      }]
    },

    options:{
      responsive:true,

      scales:{
        y:{
          beginAtZero:true
        }
      }
    }

  });

function updateChart(value){

  if(chart.data.labels.length > 20){

    chart.data.labels.shift();

    chart.data.datasets[0].data.shift();

  }

  chart.data.labels.push("");

  chart.data.datasets[0].data.push(value);

  chart.update();

}

function updateSignal(){

  if(!navigator.onLine){

    offlineMode();
    return;

  }

  let speed =
    random(20,200);

  let ping =
    random(5,80);

  let signal =
    random(30,100);

  const types=[
    "5G",
    "WiFi 6",
    "Fiber",
    "Starlink",
    "4G LTE"
  ];

  const network =
    types[random(0,types.length-1)];

  document.getElementById("speed").innerHTML =
    speed+" Mbps";

  document.getElementById("ping").innerHTML =
    ping+" ms";

  document.getElementById("signal").innerHTML =
    signal+"%";

  document.getElementById("network").innerHTML =
    network;

  bars.forEach(bar=>{

    bar.classList.remove("active");

  });

  let active =
    Math.ceil(signal/20);

  for(let i=0;i<active;i++){

    bars[i].classList.add("active");

  }

  const status =
    document.getElementById("status");

  if(signal > 75){

    status.className =
      "status good";

    status.innerHTML =
      "🚀 EXCELLENT CONNECTION";

  }
  else if(signal > 40){

    status.className =
      "status medium";

    status.innerHTML =
      "⚠️ MEDIUM CONNECTION";

  }
  else{

    status.className =
      "status bad";

    status.innerHTML =
      "❌ WEAK SIGNAL";

  }

  updateChart(ping);

  addLog(
    `Signal ${signal}% | Ping ${ping}ms`
  );

  terminalLog(
    `Latency ${ping}ms | ${speed} Mbps`
  );

}

function offlineMode(){

  stats.disconnects++;

  document.getElementById("speed").innerHTML =
    "0 Mbps";

  document.getElementById("ping").innerHTML =
    "Timeout";

  document.getElementById("signal").innerHTML =
    "0%";

  document.getElementById("network").innerHTML =
    "OFFLINE";

  bars.forEach(bar=>{

    bar.classList.remove("active");

  });

  document.getElementById("status").className =
    "status bad";

  document.getElementById("status").innerHTML =
    "🚫 CONNECTION LOST";

  playAlert();

  voiceAlert(
    "Warning. Internet connection lost."
  );

  showAlert();

  addLog(
    "🚫 INTERNET LOST"
  );

  terminalLog(
    "WARNING: Network disconnected"
  );

}

/* EXPORT */

function exportTXT(){

  const content =
`
CYBER NETWORK REPORT

Disconnects:
${stats.disconnects}

Logs:
${networkLogs.join("\n")}
`;

  const blob =
    new Blob(
      [content],
      {type:"text/plain"}
    );

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href=url;

  a.download =
    "network-report.txt";

  a.click();

}

function exportJSON(){

  const data={

    stats,
    logs:networkLogs

  };

  const blob =
    new Blob(
      [
        JSON.stringify(
          data,
          null,
          2
        )
      ],
      {
        type:"application/json"
      }
    );

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href=url;

  a.download =
    "network-report.json";

  a.click();

}

window.addEventListener(
  "offline",
  offlineMode
);

window.addEventListener(
  "online",
  updateSignal
);

updateSignal();

setInterval(
  updateSignal,
  4000
);

</script>

</body>
</html>
